  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: 850748373480.dkr.ecr.us-east-1.amazonaws.com/backend:702db30c64fc57462a5c9f5e1dba923ef9fffe3c
          ports:
            - containerPort: 5000

