apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: 850748373480.dkr.ecr.us-east-1.amazonaws.com/backend:f9f1be8544c49f4516a896c0b71ad35ac789
          ports:
            - containerPort: 3000
