# Create docker compose file for frontend and backend
version: "3"
services:
  movie-api:
    build:
      context: ./backend
    ports:
      - "5000:5000"
  movie-frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_MOVIE_API_URL: "http://localhost:5000"
