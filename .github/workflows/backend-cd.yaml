name: 'Backend CD'
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'starter/backend/**'
defaults:
      run:
        working-directory: starter/backend
        shell: bash

env:
  AWS_REGION: us-east-1
  ECR_REPO: backend
  ECR_R: ${{ secrets.ECR_REG }}
  EKS_CLUSTER: cluster

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Setup pipenv flake8
        run: |
          python -m pip install --upgrade pip
          pip install pipenv flake8
      - name: Install dependencies
        run: pipenv install
      - name: Lint
        run: pipenv run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Setup pipenv flake8
        run: |
          python -m pip install --upgrade pip
          pip install pipenv flake8
      - name: Install dependencies
        run: pipenv install
      - name: Tests
        run: pipenv run test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Check cred
        run: echo '${{ env.ECR_R }}'
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push image
        run: |
          docker build -t ${{ secrets.ECR_REG }}/${{ env.ECR_REPO }}:${{ github.sha }} .
          docker push ${{ secrets.ECR_REG }}/${{ env.ECR_REPO }}:${{ github.sha }}
      - name: Configure kube
        run: aws eks update-config --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}
      - name: Deploy kube
        run: |
          cd k8s
          kustomize edit set image backend=${{ secrets.ECR_REG }}/${{ env.ECR_REPO }}:${{ github.sha }}
          kustomize build | kubectl apply -f -
          kubectl get pods -A
      - name: Get URL
        run: |
          URL=${kubectl get svc backend -o jsonpath='{.status.loadbalancer.ingress[0].hostname}'}
          echo $URL