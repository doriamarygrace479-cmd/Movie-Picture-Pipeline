name: 'Backend CI'
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'starter/backend/**'
defaults:
      run:
        working-directory: starter/backend
        shell: bash
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup python
        users: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Setup pipenv flake8
        run: |
          python -m pip install --upgrade pip
          pip install pipenv flake8
      - name: Install dependencies
        run: pipenv install
      - name: Lint
        run: pipenv run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup python
        users: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Setup pipenv flake8
        run: |
          python -m pip install --upgrade pip
          pip install pipenv flake8
      - name: Install dependencies
        run: pipenv install
      - name: Tests
        run: pipenv run test

  build:
    - name: Build
      runs-on: ubuntu-latest
      needs: [lint, test]
    if: success()
    - name: Checkout code
      uses: actions/checkout@v3
    - name: Setup python
      users: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Setup pipenv flake8
      run: |
        python -m pip install --upgrade pip
        pip install pipenv flake8
    - name: Install dependencies
      run: pipenv install
    - name: Build docker
      run: docker build --tag mp-backend:${{ github.sha }} .
    - name: Run image
      run: docker run -p 5000:5000 --name mp-backend -d mp-backend
    - name: Test curl
      run: curl http://localhost:5000/movies
    - name: Stop image
      run: docker stop