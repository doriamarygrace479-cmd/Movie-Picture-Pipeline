name: 'Frontend CD'
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'starter/frontend/**'
defaults:
      run:
        working-directory: starter/frontend
        shell: bash

env:
  AWS_REGION: us-east-1
  REACT_APP_MOVIE_API_URL: 
  ECR_REPO: frontend
  EKS_CLUSTER: cluster

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 18.14
      - name: Cache npm
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: ~./npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 18.14
      - name: Cache npm
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: ~./npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Install dependencies
        run: npm ci
      - name: Tests
        run: CI=true npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: $AWS_REGION
      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push image
        run: |
          docker build --build-arg=REACT_APP_MOVIE_API_URL=$REACT_APP_MOVIE_API_URL -t ${{ secrets.ECR_REG }}/$ECR_REPO:${{ github.sha }} .
          docker push ${{ secrets.ECR_REG }}/$ECR_REPO:${{ github.sha }}
      - name: Configure kube
        run: aws eks update-kubeconfig --name $EKS_CLUSTER --region $AWS_REGION
      - name: Deploy kube
        run: |
          cd k8s
          kustomize edit set image frontend=${{ secrets.ECR_REG }}/$ECR_REPO:${{ github.sha }}
          kustomize build | kubectl apply -f -
      - name: Get status
        run: |
          kubectl get services
          kubectl get pods